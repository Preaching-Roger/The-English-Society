<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Society</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        
        :root {
            --light-bg: #ffffff;
            --light-text: #000080;
            --dark-bg: #0d1b2a;
            --dark-text: #ffffff;
            --toggle-light: #ccc;
            --toggle-dark: #6a5acd;
            --nav-light: #000080;
            --nav-dark: #6a5acd;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-bg);
            color: var(--light-text);
            transition: all 0.3s ease-in-out;
            text-align: center;
        }

        .dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--nav-light);
            color: white;
            transition: background-color 0.3s ease-in-out;
        }

        .dark-mode nav {
            background-color: var(--nav-dark);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px;
            transition: 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
            transform: scale(1.1);
        }

        .toggle-container {
            display: flex;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--toggle-light);
            transition: .4s;
            border-radius: 24px;
        }

        .dark-mode .slider {
            background-color: var(--toggle-dark);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            opacity: 0;
            animation: fadeInText 2s ease-out forwards;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 20px;
            opacity: 0;
            animation: riseUp 2s ease-out forwards;
        }

        .slogan {
            font-size: 1.5em;
            font-weight: 400;
            margin-top: 10px;
            opacity: 0;
            animation: fadeInText 2s ease-out 1s forwards;
        }

        /* Animations */
        @keyframes fadeInText {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes riseUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="home.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="works.html">Our Works</a>
            <a href="members.html">Our Members</a>
            <a href="feedback.html">Feedback</a>
        </div>
        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox" onclick="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
    </nav>
    <div class="container">
        <img src="CLUB LOGO PNG.png" alt="English Society Logo Light" class="logo" id="logo">
        <h1>English Society</h1>
        <p class="slogan">"Fostering a love for literature and language"</p>
    </div>
    <script>
        function toggleDarkMode() {
            const slider = document.querySelector('.slider');
            document.body.classList.toggle("dark-mode");
            const logo = document.getElementById('logo');
            const container = document.querySelector('.container');
            container.style.animation = 'none';
            void container.offsetWidth;
            container.style.animation = 'fadeInText 2s ease-out forwards';
            if (document.body.classList.contains('dark-mode')) {
                logo.src = 'CLUB LOGO PNG BUT WHITE.png'; 
            } else {
                logo.src = 'CLUB LOGO PNG.png';
            }
            slider.classList.toggle('active');
        }

        const navLinks = document.querySelectorAll('nav a');
        navLinks.forEach(link => {
            link.addEventListener('mouseover', function() {
                link.style.transform = 'scale(1.1)';
            });
            link.addEventListener('mouseout', function() {
                link.style.transform = '';
            });
        });
    </script>
</body>
</html>
